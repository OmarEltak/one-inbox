<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.8" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#accent)"/>
    <text x="28" y="38" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">O</text>
    <text x="80" y="38" font-family="-apple-system, system-ui, sans-serif" font-size="26" font-weight="700" fill="white">OT1 Pro</text>
  </g>

  <g transform="translate(80, 220)">
    <text font-family="-apple-system, system-ui, sans-serif" font-size="68" font-weight="800" fill="white">
      <tspan x="0" dy="0">Every message.</tspan>
      <tspan x="0" dy="84" fill="url(#accent)">One inbox.</tspan>
      <tspan x="0" dy="84">Zero missed sales.</tspan>
    </text>
  </g>

  <g transform="translate(80, 540)">
    <text font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">
      WhatsApp · Instagram · Facebook · Telegram + AI Sales Responder
    </text>
  </g>

  <g transform="translate(960, 80)" opacity="0.85">
    <circle cx="0" cy="0" r="36" fill="#25d366"/>
    <text x="0" y="9" font-family="-apple-system, system-ui, sans-serif" font-size="34" font-weight="700" fill="white" text-anchor="middle">W</text>
    <circle cx="-70" cy="40" r="32" fill="#e1306c"/>
    <text x="-70" y="50" font-family="-apple-system, system-ui, sans-serif" font-size="30" font-weight="700" fill="white" text-anchor="middle">I</text>
    <circle cx="70" cy="40" r="32" fill="#1877f2"/>
    <text x="70" y="50" font-family="-apple-system, system-ui, sans-serif" font-size="30" font-weight="700" fill="white" text-anchor="middle">F</text>
    <circle cx="0" cy="80" r="32" fill="#0088cc"/>
    <text x="0" y="90" font-family="-apple-system, system-ui, sans-serif" font-size="30" font-weight="700" fill="white" text-anchor="middle">T</text>
  </g>
</svg>
