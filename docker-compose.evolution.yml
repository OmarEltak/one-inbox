##
## Evolution API + PostgreSQL + Redis
## Start:  docker compose -f docker-compose.evolution.yml up -d
## Stop:   docker compose -f docker-compose.evolution.yml down
## Logs:   docker compose -f docker-compose.evolution.yml logs -f evolution-api
##

services:
  evolution-postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-evolution_secret}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution-net

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8081:8080"          # Internal only — not exposed to internet (8080 is used by Reverb)
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Lets Evolution reach Laravel on the host
    depends_on:
      - evolution-postgres
      - evolution-redis
    environment:
      # Auth — must match EVOLUTION_API_KEY in Laravel .env
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Database
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://evolution:${EVOLUTION_DB_PASSWORD:-evolution_secret}@evolution-postgres:5432/evolution?schema=public"
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api

      # Enable all entity saving
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # Redis cache (required for in-memory session state)
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://evolution-redis:6379"
      CACHE_REDIS_PREFIX_KEY: "evol"
      CACHE_REDIS_TTL: "604800"
      CACHE_LOCAL_ENABLED: "false"

      # Server
      SERVER_PORT: "8080"
      SERVER_URL: "http://localhost:8081"

      # Misc
      DEL_INSTANCE: "false"
      LANGUAGE: "en"

      # Allow 6 QR code regenerations (~2 minutes) before giving up.
      # Default is 1, which removes the instance after the first QR expires (~20s).
      QRCODE_LIMIT: "6"

      # Force Evolution API to auto-fetch the latest WA version via fetchLatestBaileysVersion()
      # The bundled .env inside the image has an outdated hardcoded version (2.3000.1015901307)
      # which causes WhatsApp to reject the connection with code 405.
      # Setting this to empty overrides that bundled value and enables auto-fetch.
      CONFIG_SESSION_PHONE_VERSION: ""
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net

volumes:
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances:

networks:
  evolution-net:
    driver: bridge
